{% extends 'base/base.html' %}

{% block title %}Verify — WeatherGate{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center" style="background:#0f1b2d">
    <div class="w-full max-w-md p-8 rounded-2xl" style="background:#1a2d42">

        <div class="flex flex-col items-center gap-2 mb-8">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center font-bold text-white text-sm" style="background:#1e6fb5">WG</div>
            <h1 class="text-white font-bold text-xl">WeatherGate</h1>
            <p class="text-sm text-center" style="color:#7aaed4">Enter the 6-digit code sent to your email</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="px-4 py-3 rounded-lg mb-4 text-sm" style="background:#1e3a5f;color:#f87171">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-6">
                <label class="block text-sm font-medium mb-1 text-center" style="color:#7aaed4">Verification code</label>
                <input type="text" name="token" maxlength="6" required
                    class="w-full rounded-lg px-3 py-3 text-sm focus:outline-none text-center tracking-widest text-lg"
                    style="background:#0f1b2d;color:#e8f4fd;border:1px solid #2a4a6b;letter-spacing:0.5em"
                    placeholder="000000">
            </div>

            <button type="submit"
                class="w-full py-2 rounded-lg font-semibold text-white text-sm"
                style="background:#1e6fb5">
                Verify
            </button>
        </form>

        <p class="text-center text-sm mt-4">
            <a href="{% url 'login' %}" style="color:#4a6a8a">Back to login</a>
        </p>

    </div>
</div>
{% endblock %}
